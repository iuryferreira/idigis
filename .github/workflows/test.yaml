name: .NET Testing
on:
  pull_request:
    branches: [ develop, stable ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 5.0.103
    - name: Install dependencies
      run: dotnet restore
    - name: Test
      run: dotnet test --nologo -v q